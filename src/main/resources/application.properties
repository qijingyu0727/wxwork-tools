server.port=9999

mybatis.mapper-locations=classpath:com/dao/*.xml
mybatis.type-aliases-package=com.model

#pagehelper分页插件配置
pagehelper.helper-dialect=mysql
pagehelper.reasonable=true
pagehelper.support-methods-arguments=true
pagehelper.params=count=countSql

api_access_token_url=https://qyapi.weixin.qq.com/cgi-bin/gettoken
api_create_doc_url=https://qyapi.weixin.qq.com/cgi-bin/wedoc/create_doc?access_token=%s
api_get_user_id_url=https://qyapi.weixin.qq.com/cgi-bin/user/getuserid?access_token=%s

# 扫码登录相关API
api_get_login_qrcode_url=https://open.work.weixin.qq.com/wwopen/sso/qrConnect?appid=%s&agentid=%s&redirect_uri=%s&state=%s
api_get_user_info_url=https://qyapi.weixin.qq.com/cgi-bin/user/getuserinfo?access_token=%s&code=%s
api_get_user_detail_url=https://qyapi.weixin.qq.com/cgi-bin/user/get?access_token=%s&userid=%s

